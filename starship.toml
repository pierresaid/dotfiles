"$schema" = 'https://starship.rs/config-schema.json'

format = """
[вЦСвЦТвЦУ](#abb2bf)\
[ рЯХА ](bg:#abb2bf fg:#1e2127)\
[оВі](bg:#61afef fg:#abb2bf)\
$directory\
[оВі](fg:#61afef bg:#3e4451)\
$git_branch\
$git_status\
[оВі](fg:#3e4451 bg:#2c313a)\
$nodejs\
$bun\
$rust\
$golang\
$php\
[оВі](fg:#2c313a bg:#21252b)\
$time\
[оВі ](fg:#21252b)\
\n$character"""

[directory]
style = "fg:#1e2127 bg:#61afef"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#3e4451"
format = '[[ $symbol $branch ](fg:#61afef bg:#3e4451)]($style)'

[git_status]
style = "bg:#3e4451"
format = '[[($all_status$ahead_behind )](fg:#61afef bg:#3e4451)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#2c313a"
format = '[[ $symbol ($version) ](fg:#61afef bg:#2c313a)]($style)'

[bun]
symbol = "оЭѓ"
style = "bg:#2c313a"
format = '[[ $symbol ($version) ](fg:#61afef bg:#2c313a)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#2c313a"
format = '[[ $symbol ($version) ](fg:#61afef bg:#2c313a)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#2c313a"
format = '[[ $symbol ($version) ](fg:#61afef bg:#2c313a)]($style)'

[php]
symbol = "оШИ"
style = "bg:#2c313a"
format = '[[ $symbol ($version) ](fg:#61afef bg:#2c313a)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#21252b"
format = '[[ пРЇ $time ](fg:#828997 bg:#21252b)]($style)'
